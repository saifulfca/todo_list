<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskNest — Professional To-Do</title>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface-2: #f7f9fc;
    --border: #e6e9f0;
    --text: #1f2733;
    --text-soft: #667085;
    --text-faint: #9aa3b2;
    --accent: #4f46e5;
    --accent-soft: #eef0fe;
    --shadow: 0 1px 3px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    --shadow-lg: 0 12px 40px rgba(16,24,40,.16);
    --radius: 14px;
    --radius-sm: 10px;
    --high: #ef4444;
    --high-bg: #fee2e2;
    --med: #f59e0b;
    --med-bg: #fef3c7;
    --low: #10b981;
    --low-bg: #d1fae5;
    --overdue: #dc2626;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html[data-theme="dark"] {
    --bg: #0f1420;
    --surface: #171d2b;
    --surface-2: #1d2536;
    --border: #2a3244;
    --text: #e7ecf3;
    --text-soft: #9aa6bb;
    --text-faint: #6b7688;
    --accent: #7c83ff;
    --accent-soft: #232a45;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
    --high-bg: #3a1f22;
    --med-bg: #3a2e17;
    --low-bg: #14332a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    height: 100vh;
    overflow: hidden;
    transition: background .3s, color .3s;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 268px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: background .3s, border-color .3s;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 20px 14px;
  }
  .brand .logo {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #9089fc);
    display: grid; place-items: center;
    color: #fff; font-size: 18px;
    box-shadow: 0 4px 12px rgba(79,70,229,.4);
  }
  .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  .brand span { font-size: 11px; color: var(--text-faint); display: block; font-weight: 500; }

  .nav-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-faint); font-weight: 700;
    padding: 14px 20px 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-label button {
    background: none; border: none; color: var(--accent);
    font-size: 16px; cursor: pointer; line-height: 1; font-weight: 700;
    width: 20px; height: 20px; border-radius: 5px;
  }
  .nav-label button:hover { background: var(--accent-soft); }

  .cat-list { list-style: none; padding: 0 12px; overflow-y: auto; flex: 1; }
  .cat-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; margin-bottom: 3px;
    position: relative; transition: background .15s;
  }
  .cat-item:hover { background: var(--surface-2); }
  .cat-item.active { background: var(--accent-soft); }
  .cat-item.active .cat-name { color: var(--accent); font-weight: 600; }
  .cat-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { flex: 1; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-count {
    font-size: 12px; color: var(--text-faint); font-weight: 600;
    background: var(--surface-2); padding: 1px 8px; border-radius: 20px;
  }
  .cat-item.active .cat-count { background: var(--surface); }
  .cat-del {
    display: none; background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 14px; padding: 0 2px;
  }
  .cat-item:hover .cat-del { display: block; }
  .cat-del:hover { color: var(--high); }

  .sidebar-foot { padding: 12px 14px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sidebar-foot button {
    font-size: 12px; font-weight: 600; padding: 9px 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-soft); border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
  }
  .sidebar-foot button:hover { background: var(--surface-2); color: var(--text); }
  .sidebar-foot button.wide { grid-column: 1 / -1; }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 28px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .cat-title { display: flex; align-items: center; gap: 12px; }
  .cat-title .big-dot { width: 16px; height: 16px; border-radius: 50%; }
  .cat-title h2 { font-size: 21px; font-weight: 700; letter-spacing: -.4px; }

  .search {
    flex: 1; max-width: 340px; margin-left: auto;
    position: relative;
  }
  .search input {
    width: 100%; padding: 9px 14px 9px 36px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-2); color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none; transition: border-color .15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text-soft); cursor: pointer; font-size: 17px;
    display: grid; place-items: center; transition: all .15s;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent); }

  .content { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }
  .content-inner { max-width: 820px; margin: 0 auto; }

  /* progress */
  .stats-row { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 110px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .stat-card .num { font-size: 26px; font-weight: 750; letter-spacing: -1px; }
  .stat-card .lbl { font-size: 12px; color: var(--text-soft); font-weight: 600; margin-top: 2px; }
  .progress-wrap { margin-top: 10px; }
  .progress-track { height: 7px; background: var(--surface-2); border-radius: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #9089fc); border-radius: 20px; transition: width .4s ease; width: 0; }

  /* add form */
  .add-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px; margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .add-top { display: flex; align-items: center; gap: 10px; padding: 6px 8px; }
  .add-top input.title-in {
    flex: 1; border: none; background: none; font-size: 16px; color: var(--text);
    font-family: var(--font); outline: none; font-weight: 500;
  }
  .add-plus { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
  .add-details {
    display: grid; grid-template-columns: 1fr; gap: 10px;
    max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s;
    padding: 0 8px;
  }
  .add-card.open .add-details { max-height: 360px; padding: 6px 8px 10px; }
  .add-details textarea, .add-details input.text-in {
    width: 100%; border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 11px; font-family: var(--font); font-size: 13.5px;
    background: var(--surface-2); color: var(--text); resize: vertical; outline: none;
  }
  .add-details textarea { min-height: 44px; }
  .add-details textarea:focus, .add-details input.text-in:focus { border-color: var(--accent); }
  .add-controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 10.5px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .4px; }
  .field select, .field input[type="datetime-local"], .field input.text-in {
    border: 1px solid var(--border); border-radius: 9px; padding: 8px 10px;
    font-family: var(--font); font-size: 13px; background: var(--surface-2); color: var(--text); outline: none;
  }
  .field select:focus, .field input:focus { border-color: var(--accent); }
  .add-btn {
    margin-left: auto;
    background: var(--accent); color: #fff; border: none; padding: 10px 20px;
    border-radius: 9px; font-weight: 650; font-size: 14px; cursor: pointer;
    font-family: var(--font); transition: filter .15s;
  }
  .add-btn:hover { filter: brightness(1.08); }

  /* filter bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .chip {
    font-size: 12.5px; font-weight: 600; padding: 6px 13px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-soft);
    cursor: pointer; transition: all .15s;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sort-select {
    margin-left: auto; border: 1px solid var(--border); border-radius: 9px;
    padding: 6px 10px; font-size: 12.5px; font-weight: 600; background: var(--surface);
    color: var(--text-soft); font-family: var(--font); cursor: pointer; outline: none;
  }

  /* task list */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .task {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow); transition: transform .12s, opacity .3s, box-shadow .15s;
    border-left: 4px solid transparent;
    animation: pop .25s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .task:hover { box-shadow: var(--shadow-lg); }
  .task.p-high { border-left-color: var(--high); }
  .task.p-med { border-left-color: var(--med); }
  .task.p-low { border-left-color: var(--low); }
  .task.done { opacity: .58; }
  .task.done .task-title { text-decoration: line-through; color: var(--text-soft); }
  .task.dragging { opacity: .4; }
  .task.drag-over { border-top: 2px dashed var(--accent); }

  .task-head { display: flex; align-items: flex-start; gap: 13px; padding: 14px 16px; }
  .drag-handle {
    cursor: grab; color: var(--text-faint); font-size: 15px; padding-top: 2px;
    display: none; user-select: none;
  }
  body.manual-sort .drag-handle { display: block; }
  body.manual-sort .task:not(.done) { cursor: default; }

  .check {
    width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border);
    cursor: pointer; flex-shrink: 0; margin-top: 1px; display: grid; place-items: center;
    transition: all .15s; background: var(--surface);
  }
  .check:hover { border-color: var(--accent); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked::after { content: "✓"; color: #fff; font-size: 14px; font-weight: 800; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 600; line-height: 1.35; word-break: break-word; outline: none; }
  .task-title[contenteditable="true"] { background: var(--surface-2); border-radius: 6px; padding: 2px 6px; margin: -2px -6px; }
  .task-notes { font-size: 13px; color: var(--text-soft); margin-top: 4px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .task-meta { display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .badge.high { background: var(--high-bg); color: var(--high); }
  .badge.med { background: var(--med-bg); color: var(--med); }
  .badge.low { background: var(--low-bg); color: var(--low); }
  .badge.date { background: var(--surface-2); color: var(--text-soft); }
  .badge.date.overdue { background: var(--high-bg); color: var(--overdue); }
  .badge.date.soon { background: var(--med-bg); color: var(--med); }
  .badge.recur { background: var(--accent-soft); color: var(--accent); }
  .badge.sub { background: var(--surface-2); color: var(--text-soft); }
  .tag {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px;
    background: var(--surface-2); color: var(--text-soft); cursor: pointer; border: 1px solid var(--border);
  }
  .tag:hover { color: var(--accent); border-color: var(--accent); }

  .task-actions { display: flex; gap: 2px; align-items: center; }
  .act {
    background: none; border: none; cursor: pointer; color: var(--text-faint);
    width: 32px; height: 32px; border-radius: 8px; font-size: 15px;
    display: grid; place-items: center; transition: all .15s;
  }
  .act:hover { background: var(--surface-2); color: var(--accent); }
  .act.gcal:hover { color: #ea4335; }
  .act.del:hover { color: var(--high); }
  .act.expand.open { color: var(--accent); transform: rotate(180deg); }

  /* sub progress mini bar */
  .sub-mini { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .sub-mini .track { flex: 1; height: 5px; background: var(--surface-2); border-radius: 20px; overflow: hidden; max-width: 180px; }
  .sub-mini .fill { height: 100%; background: var(--low); border-radius: 20px; transition: width .3s; }
  .sub-mini .lbl { font-size: 11px; color: var(--text-faint); font-weight: 600; }

  /* expanded editor */
  .task-detail {
    border-top: 1px solid var(--border); padding: 0 16px;
    max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s;
  }
  .task.expanded .task-detail { max-height: 700px; padding: 14px 16px; }
  .detail-section-label { font-size: 10.5px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
  .sub-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .sub-item { display: flex; align-items: center; gap: 10px; }
  .sub-check {
    width: 18px; height: 18px; border-radius: 6px; border: 2px solid var(--border);
    cursor: pointer; flex-shrink: 0; display: grid; place-items: center; transition: all .15s;
  }
  .sub-check.checked { background: var(--low); border-color: var(--low); }
  .sub-check.checked::after { content: "✓"; color: #fff; font-size: 11px; font-weight: 800; }
  .sub-text { flex: 1; font-size: 13.5px; }
  .sub-text.done { text-decoration: line-through; color: var(--text-faint); }
  .sub-del { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 13px; }
  .sub-del:hover { color: var(--high); }
  .sub-add { display: flex; gap: 8px; margin-bottom: 16px; }
  .sub-add input {
    flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-family: var(--font); font-size: 13px; background: var(--surface-2); color: var(--text); outline: none;
  }
  .sub-add input:focus { border-color: var(--accent); }
  .sub-add button { background: var(--accent-soft); color: var(--accent); border: none; border-radius: 8px; padding: 0 14px; font-weight: 700; cursor: pointer; font-size: 16px; }

  .detail-edit { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .detail-edit .field select, .detail-edit .field input { min-width: 120px; }

  .empty { text-align: center; padding: 70px 20px; color: var(--text-faint); }
  .empty .em-icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-size: 17px; color: var(--text-soft); font-weight: 600; margin-bottom: 4px; }
  .empty p { font-size: 13.5px; }

  /* modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(15,20,32,.5); backdrop-filter: blur(3px);
    display: none; place-items: center; z-index: 50;
  }
  .modal-back.open { display: grid; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 24px;
    width: 92%; max-width: 380px; box-shadow: var(--shadow-lg); animation: pop .2s ease;
  }
  .modal h3 { font-size: 17px; margin-bottom: 16px; }
  .modal label { font-size: 12px; font-weight: 600; color: var(--text-soft); display: block; margin-bottom: 6px; }
  .modal input[type="text"] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 9px;
    background: var(--surface-2); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; margin-bottom: 16px;
  }
  .color-row { display: flex; gap: 9px; margin-bottom: 20px; flex-wrap: wrap; }
  .color-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-opt.sel { border-color: var(--text); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-ghost { background: var(--surface-2); color: var(--text-soft); border: none; padding: 9px 16px; border-radius: 9px; font-weight: 600; cursor: pointer; font-family: var(--font); font-size: 14px; }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 9px 18px; border-radius: 9px; font-weight: 600; cursor: pointer; font-family: var(--font); font-size: 14px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 10px;
    font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 100;
    opacity: 0; transition: transform .3s, opacity .3s; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .menu-toggle { display: none; }

  @media (max-width: 720px) {
    .sidebar {
      position: fixed; z-index: 40; height: 100%; transform: translateX(-100%);
      transition: transform .28s ease; box-shadow: var(--shadow-lg);
    }
    body.nav-open .sidebar { transform: translateX(0); }
    .menu-toggle { display: grid; }
    .search { max-width: none; }
    .topbar { padding: 14px 16px; gap: 10px; }
    .content { padding: 16px 14px 60px; }
    .add-controls { flex-direction: column; align-items: stretch; }
    .add-btn { margin-left: 0; width: 100%; }
    .nav-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 39; display: none; }
    body.nav-open .nav-scrim { display: block; }
  }
</style>
</head>
<body>
  <div class="nav-scrim" id="scrim"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">✦</div>
      <div>
        <h1>TaskNest</h1>
        <span>Organize. Prioritize. Done.</span>
      </div>
    </div>

    <div class="nav-label">
      <span>Notebooks</span>
      <button id="addCatBtn" title="New notebook">＋</button>
    </div>
    <ul class="cat-list" id="catList"></ul>

    <div class="sidebar-foot">
      <button id="exportBtn" title="Backup all data to a JSON file">⬇ Backup</button>
      <button id="importBtn" title="Restore from a backup file">⬆ Restore</button>
      <button id="icsBtn" class="wide" title="Export all scheduled tasks as a calendar file">📆 Export calendar (.ics)</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle">☰</button>
      <div class="cat-title">
        <span class="big-dot" id="catDot"></span>
        <h2 id="catHeading">All Tasks</h2>
      </div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search tasks, notes, #tags…" />
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
    </div>

    <div class="content">
      <div class="content-inner">
        <!-- stats -->
        <div class="stats-row" id="statsRow"></div>

        <!-- add task -->
        <div class="add-card" id="addCard">
          <div class="add-top">
            <div class="add-plus">＋</div>
            <input type="text" class="title-in" id="taskTitle" placeholder="Add a task and press Enter…" />
          </div>
          <div class="add-details">
            <textarea id="taskNotes" placeholder="Notes / details (optional)"></textarea>
            <input type="text" class="text-in" id="taskTags" placeholder="Tags, comma separated (e.g. urgent, client, review)" />
            <div class="add-controls">
              <div class="field">
                <label>Priority</label>
                <select id="taskPriority">
                  <option value="high">🔴 High</option>
                  <option value="med" selected>🟡 Medium</option>
                  <option value="low">🟢 Low</option>
                </select>
              </div>
              <div class="field">
                <label>Deadline</label>
                <input type="datetime-local" id="taskDeadline" />
              </div>
              <div class="field">
                <label>Repeat</label>
                <select id="taskRecur">
                  <option value="none" selected>No repeat</option>
                  <option value="daily">🔁 Daily</option>
                  <option value="weekly">🔁 Weekly</option>
                  <option value="monthly">🔁 Monthly</option>
                </select>
              </div>
              <button class="add-btn" id="addTaskBtn">Add Task</button>
            </div>
          </div>
        </div>

        <!-- filters -->
        <div class="filter-bar">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="active">Active</button>
          <button class="chip" data-filter="done">Completed</button>
          <button class="chip" data-filter="high">High priority</button>
          <button class="chip" data-filter="today">Due soon</button>
          <select class="sort-select" id="sortSelect">
            <option value="smart">↕ Smart sort (priority & deadline)</option>
            <option value="manual">✋ Manual order (drag)</option>
          </select>
        </div>

        <!-- tasks -->
        <ul class="task-list" id="taskList"></ul>
        <div class="empty" id="emptyState" style="display:none">
          <div class="em-icon">📋</div>
          <h3>Nothing here yet</h3>
          <p>Add your first task above to get started.</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Category modal -->
  <div class="modal-back" id="catModal">
    <div class="modal">
      <h3 id="catModalTitle">New Notebook</h3>
      <label>Name</label>
      <input type="text" id="catNameInput" placeholder="e.g. Study, Fitness, Projects" maxlength="24" />
      <label>Color</label>
      <div class="color-row" id="colorRow"></div>
      <div class="modal-actions">
        <button class="btn-ghost" id="catCancel">Cancel</button>
        <button class="btn-primary" id="catSave">Create</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const LS_KEY = "tasknest.v2";
  const LS_KEY_OLD = "tasknest.v1";
  const COLORS = ["#4f46e5","#0ea5e9","#10b981","#f59e0b","#ef4444","#ec4899","#8b5cf6","#14b8a6"];
  const PRIO_RANK = { high: 0, med: 1, low: 2 };
  const PRIO_LABEL = { high: "High", med: "Medium", low: "Low" };
  const RECUR_LABEL = { daily: "Daily", weekly: "Weekly", monthly: "Monthly" };

  // ---------- State ----------
  let state = load();
  let activeCat = "all";
  let filter = "all";
  let search = "";
  let editingCatColor = COLORS[0];
  let expanded = new Set();   // UI-only: expanded task ids
  let focusSubFor = null;     // task id whose sub-add input to refocus after render
  let dragId = null;

  function seed() {
    return {
      categories: [
        { id: "office",   name: "Office",   color: "#4f46e5" },
        { id: "personal", name: "Personal", color: "#10b981" },
        { id: "other",    name: "Other",    color: "#f59e0b" }
      ],
      tasks: [],
      theme: "light",
      sortMode: "smart"
    };
  }

  function normalizeTask(t, i) {
    return {
      id: t.id || uid(),
      categoryId: t.categoryId,
      title: t.title || "",
      notes: t.notes || "",
      priority: t.priority || "med",
      deadline: t.deadline || "",
      completed: !!t.completed,
      createdAt: t.createdAt || Date.now(),
      completedAt: t.completedAt || null,
      recur: t.recur || "none",
      subtasks: Array.isArray(t.subtasks) ? t.subtasks : [],
      tags: Array.isArray(t.tags) ? t.tags : [],
      order: typeof t.order === "number" ? t.order : (t.createdAt || Date.now()) + i,
      _spawned: !!t._spawned
    };
  }

  function load() {
    try {
      let raw = localStorage.getItem(LS_KEY) || localStorage.getItem(LS_KEY_OLD);
      if (!raw) return seed();
      const data = JSON.parse(raw);
      if (!data.categories || !data.tasks) return seed();
      data.theme = data.theme || "light";
      data.sortMode = data.sortMode || "smart";
      data.tasks = data.tasks.map(normalizeTask);
      return data;
    } catch (e) { return seed(); }
  }

  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch (e) { toast("⚠ Could not save — storage may be full"); }
  }

  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const catList = $("catList"), taskList = $("taskList"), statsRow = $("statsRow");
  const catHeading = $("catHeading"), catDot = $("catDot"), emptyState = $("emptyState");

  // ---------- Theme ----------
  function applyTheme() {
    document.documentElement.setAttribute("data-theme", state.theme);
    $("themeToggle").textContent = state.theme === "dark" ? "☀️" : "🌙";
  }
  $("themeToggle").onclick = () => {
    state.theme = state.theme === "dark" ? "light" : "dark";
    applyTheme(); save();
  };

  // ---------- Categories ----------
  function renderCats() {
    catList.innerHTML = "";
    catList.appendChild(catItem({ id: "all", name: "All Tasks", color: "#9089fc" }, true));
    state.categories.forEach(c => catList.appendChild(catItem(c, false)));
  }

  function catItem(cat, isAll) {
    const li = document.createElement("li");
    li.className = "cat-item" + (activeCat === cat.id ? " active" : "");
    const count = state.tasks.filter(t => (isAll || t.categoryId === cat.id) && !t.completed).length;
    li.innerHTML = `
      <span class="cat-dot" style="background:${cat.color}"></span>
      <span class="cat-name">${esc(cat.name)}</span>
      <span class="cat-count">${count}</span>
      ${isAll ? "" : `<button class="cat-del" title="Delete notebook">✕</button>`}`;
    li.onclick = (e) => {
      if (e.target.classList.contains("cat-del")) return;
      activeCat = cat.id; render();
      document.body.classList.remove("nav-open");
    };
    const del = li.querySelector(".cat-del");
    if (del) del.onclick = (e) => { e.stopPropagation(); deleteCat(cat); };
    return li;
  }

  function deleteCat(cat) {
    const n = state.tasks.filter(t => t.categoryId === cat.id).length;
    if (!confirm(`Delete "${cat.name}"${n ? ` and its ${n} task(s)` : ""}?`)) return;
    state.categories = state.categories.filter(c => c.id !== cat.id);
    state.tasks = state.tasks.filter(t => t.categoryId !== cat.id);
    if (activeCat === cat.id) activeCat = "all";
    save(); render(); toast("Notebook deleted");
  }

  // ---------- Tasks ----------
  function minOrder() {
    const os = state.tasks.map(t => t.order);
    return os.length ? Math.min(...os) : 0;
  }

  function addTask() {
    const title = $("taskTitle").value.trim();
    if (!title) { $("taskTitle").focus(); return; }
    let cat = activeCat === "all" ? (state.categories[0] && state.categories[0].id) : activeCat;
    if (!cat) { toast("Create a notebook first"); return; }
    const tags = $("taskTags").value.split(",").map(s => s.trim()).filter(Boolean);
    state.tasks.push({
      id: uid(),
      categoryId: cat,
      title,
      notes: $("taskNotes").value.trim(),
      priority: $("taskPriority").value,
      deadline: $("taskDeadline").value || "",
      completed: false,
      createdAt: Date.now(),
      completedAt: null,
      recur: $("taskRecur").value,
      subtasks: [],
      tags,
      order: minOrder() - 1,
      _spawned: false
    });
    $("taskTitle").value = ""; $("taskNotes").value = ""; $("taskTags").value = "";
    $("taskDeadline").value = ""; $("taskPriority").value = "med"; $("taskRecur").value = "none";
    $("addCard").classList.remove("open");
    save(); render();
    toast("Task added ✓");
  }

  function nextDeadline(iso, recur) {
    const base = iso ? new Date(iso) : new Date();
    const d = new Date(base);
    if (recur === "daily") d.setDate(d.getDate() + 1);
    else if (recur === "weekly") d.setDate(d.getDate() + 7);
    else if (recur === "monthly") d.setMonth(d.getMonth() + 1);
    // return in datetime-local format
    const pad = n => String(n).padStart(2, "0");
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()) +
      "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function toggleDone(id) {
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    t.completed = !t.completed;
    t.completedAt = t.completed ? Date.now() : null;
    // spawn next occurrence for recurring tasks (once)
    if (t.completed && t.recur && t.recur !== "none" && !t._spawned) {
      t._spawned = true;
      state.tasks.push({
        id: uid(),
        categoryId: t.categoryId,
        title: t.title,
        notes: t.notes,
        priority: t.priority,
        deadline: t.deadline ? nextDeadline(t.deadline, t.recur) : "",
        completed: false,
        createdAt: Date.now(),
        completedAt: null,
        recur: t.recur,
        subtasks: t.subtasks.map(s => ({ id: uid(), text: s.text, done: false })),
        tags: t.tags.slice(),
        order: minOrder() - 1,
        _spawned: false
      });
      toast("🔁 Next occurrence scheduled");
    }
    save(); render();
  }

  function deleteTask(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    expanded.delete(id);
    save(); render(); toast("Task deleted");
  }

  function updateTask(id, patch) {
    const t = state.tasks.find(x => x.id === id);
    if (!t) return;
    Object.assign(t, patch);
    save();
  }

  // ---------- Subtasks ----------
  function addSubtask(taskId, text) {
    text = (text || "").trim(); if (!text) return;
    const t = state.tasks.find(x => x.id === taskId); if (!t) return;
    t.subtasks.push({ id: uid(), text, done: false });
    focusSubFor = taskId;
    save(); render();
  }
  function toggleSub(taskId, subId) {
    const t = state.tasks.find(x => x.id === taskId); if (!t) return;
    const s = t.subtasks.find(x => x.id === subId); if (!s) return;
    s.done = !s.done;
    save(); render();
  }
  function deleteSub(taskId, subId) {
    const t = state.tasks.find(x => x.id === taskId); if (!t) return;
    t.subtasks = t.subtasks.filter(x => x.id !== subId);
    save(); render();
  }

  // ---------- Sorting / filtering ----------
  function sortTasks(arr) {
    if (state.sortMode === "manual") {
      return arr.slice().sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.completed && b.completed) return (b.completedAt || 0) - (a.completedAt || 0);
        return a.order - b.order;
      });
    }
    return arr.slice().sort((a, b) => {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (a.completed && b.completed) return (b.completedAt || 0) - (a.completedAt || 0);
      if (PRIO_RANK[a.priority] !== PRIO_RANK[b.priority]) return PRIO_RANK[a.priority] - PRIO_RANK[b.priority];
      const ad = a.deadline ? new Date(a.deadline).getTime() : Infinity;
      const bd = b.deadline ? new Date(b.deadline).getTime() : Infinity;
      if (ad !== bd) return ad - bd;
      return a.createdAt - b.createdAt;
    });
  }

  function visibleTasks() {
    let arr = state.tasks.filter(t => activeCat === "all" || t.categoryId === activeCat);
    if (filter === "active") arr = arr.filter(t => !t.completed);
    else if (filter === "done") arr = arr.filter(t => t.completed);
    else if (filter === "high") arr = arr.filter(t => t.priority === "high" && !t.completed);
    else if (filter === "today") {
      const soon = Date.now() + 2 * 86400000;
      arr = arr.filter(t => !t.completed && t.deadline && new Date(t.deadline).getTime() <= soon);
    }
    if (search) {
      const q = search.toLowerCase().replace(/^#/, "");
      arr = arr.filter(t =>
        t.title.toLowerCase().includes(q) ||
        (t.notes || "").toLowerCase().includes(q) ||
        (t.tags || []).some(tag => tag.toLowerCase().includes(q)) ||
        (t.subtasks || []).some(s => s.text.toLowerCase().includes(q)));
    }
    return sortTasks(arr);
  }

  // ---------- Deadline helpers ----------
  function deadlineInfo(iso) {
    if (!iso) return null;
    const d = new Date(iso), now = new Date();
    const diff = d - now, day = 86400000;
    let cls = "", txt = fmtDate(d);
    if (diff < 0) { cls = "overdue"; txt = "Overdue · " + fmtDate(d); }
    else if (diff < day) { cls = "soon"; txt = "Today · " + fmtTime(d); }
    else if (diff < 2 * day) { cls = "soon"; txt = "Tomorrow · " + fmtTime(d); }
    return { cls, txt };
  }
  function fmtDate(d) {
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
      (d.getHours() || d.getMinutes() ? ", " + fmtTime(d) : "");
  }
  function fmtTime(d) { return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }); }

  // ---------- Google Calendar ----------
  function pushToGCal(t) {
    const fmt = (dt) => dt.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
    let start, end;
    if (t.deadline) { start = new Date(t.deadline); end = new Date(start.getTime() + 3600000); }
    else { start = new Date(); start.setMinutes(0,0,0); start.setHours(start.getHours()+1); end = new Date(start.getTime()+3600000); }
    const cat = state.categories.find(c => c.id === t.categoryId);
    const subs = t.subtasks.length ? "\n\nChecklist:\n" + t.subtasks.map(s => (s.done ? "☑ " : "☐ ") + s.text).join("\n") : "";
    const details = (t.notes ? t.notes + "\n" : "") +
      `Priority: ${PRIO_LABEL[t.priority]}` + (cat ? `\nNotebook: ${cat.name}` : "") +
      (t.tags.length ? `\nTags: ${t.tags.join(", ")}` : "") + subs + `\n\n— via TaskNest`;
    let url = "https://calendar.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent(t.title) +
      "&dates=" + fmt(start) + "/" + fmt(end) +
      "&details=" + encodeURIComponent(details);
    const rr = { daily: "DAILY", weekly: "WEEKLY", monthly: "MONTHLY" }[t.recur];
    if (rr) url += "&recur=" + encodeURIComponent("RRULE:FREQ=" + rr);
    window.open(url, "_blank");
    toast("Opening Google Calendar…");
  }

  // ---------- ICS export ----------
  function icsEsc(s) { return (s || "").replace(/([,;\\])/g, "\\$1").replace(/\n/g, "\\n"); }
  function icsDate(d) {
    const p = n => String(n).padStart(2, "0");
    return d.getUTCFullYear() + p(d.getUTCMonth()+1) + p(d.getUTCDate()) + "T" +
      p(d.getUTCHours()) + p(d.getUTCMinutes()) + p(d.getUTCSeconds()) + "Z";
  }
  function buildICS(tasks) {
    const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TaskNest//EN","CALSCALE:GREGORIAN"];
    let count = 0;
    tasks.forEach(t => {
      if (!t.deadline) return;
      const start = new Date(t.deadline), end = new Date(start.getTime() + 3600000);
      const cat = state.categories.find(c => c.id === t.categoryId);
      const subs = t.subtasks.length ? "\nChecklist: " + t.subtasks.map(s => (s.done ? "[x] " : "[ ] ") + s.text).join("; ") : "";
      const desc = (t.notes ? t.notes : "") + " Priority: " + PRIO_LABEL[t.priority] +
        (cat ? " | " + cat.name : "") + (t.tags.length ? " | Tags: " + t.tags.join(", ") : "") + subs;
      lines.push("BEGIN:VEVENT");
      lines.push("UID:" + t.id + "@tasknest");
      lines.push("DTSTAMP:" + icsDate(new Date()));
      lines.push("DTSTART:" + icsDate(start));
      lines.push("DTEND:" + icsDate(end));
      lines.push("SUMMARY:" + icsEsc(t.title));
      lines.push("DESCRIPTION:" + icsEsc(desc.trim()));
      const rr = { daily: "DAILY", weekly: "WEEKLY", monthly: "MONTHLY" }[t.recur];
      if (rr) lines.push("RRULE:FREQ=" + rr);
      lines.push("END:VEVENT");
      count++;
    });
    lines.push("END:VCALENDAR");
    return { ics: lines.join("\r\n"), count };
  }
  function downloadFile(name, content, type) {
    const blob = new Blob([content], { type });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name; a.click();
    URL.revokeObjectURL(a.href);
  }
  function exportTaskICS(t) {
    if (!t.deadline) { toast("⚠ Set a deadline first to export"); return; }
    const { ics } = buildICS([t]);
    downloadFile("task-" + t.title.replace(/[^a-z0-9]+/gi, "-").slice(0, 30) + ".ics", ics, "text/calendar");
    toast("Calendar file downloaded 📆");
  }
  $("icsBtn").onclick = () => {
    const scope = state.tasks.filter(t => activeCat === "all" || t.categoryId === activeCat);
    const { ics, count } = buildICS(scope);
    if (!count) { toast("⚠ No tasks with deadlines to export"); return; }
    downloadFile("tasknest-calendar.ics", ics, "text/calendar");
    toast(count + " event(s) exported 📆");
  };

  // ---------- Render ----------
  function render() {
    document.body.classList.toggle("manual-sort", state.sortMode === "manual");
    $("sortSelect").value = state.sortMode;
    document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.filter === filter));

    renderCats();
    const catObj = activeCat === "all"
      ? { name: "All Tasks", color: "#9089fc" }
      : state.categories.find(c => c.id === activeCat) || { name: "All Tasks", color: "#9089fc" };
    catHeading.textContent = catObj.name;
    catDot.style.background = catObj.color;

    renderStats();

    const tasks = visibleTasks();
    taskList.innerHTML = "";
    emptyState.style.display = tasks.length ? "none" : "block";
    tasks.forEach(t => taskList.appendChild(taskEl(t)));

    if (focusSubFor) {
      const inp = taskList.querySelector(`[data-subadd="${focusSubFor}"]`);
      if (inp) inp.focus();
      focusSubFor = null;
    }
  }

  function renderStats() {
    const scope = state.tasks.filter(t => activeCat === "all" || t.categoryId === activeCat);
    const total = scope.length;
    const done = scope.filter(t => t.completed).length;
    const active = total - done;
    const overdue = scope.filter(t => !t.completed && t.deadline && new Date(t.deadline) < new Date()).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    statsRow.innerHTML = `
      <div class="stat-card"><div class="num">${active}</div><div class="lbl">Active tasks</div></div>
      <div class="stat-card"><div class="num" style="color:var(--overdue)">${overdue}</div><div class="lbl">Overdue</div></div>
      <div class="stat-card" style="flex:1.6">
        <div class="num">${pct}%</div><div class="lbl">${done} of ${total} completed</div>
        <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${pct}%"></div></div></div>
      </div>`;
  }

  function taskEl(t) {
    const li = document.createElement("li");
    const isOpen = expanded.has(t.id);
    li.className = `task p-${t.priority}` + (t.completed ? " done" : "") + (isOpen ? " expanded" : "");
    li.dataset.id = t.id;

    const di = deadlineInfo(t.deadline);
    const catObj = state.categories.find(c => c.id === t.categoryId);
    const catBadge = activeCat === "all" && catObj
      ? `<span class="badge" style="background:${catObj.color}1f;color:${catObj.color}">${esc(catObj.name)}</span>` : "";
    const subDone = t.subtasks.filter(s => s.done).length;
    const subTotal = t.subtasks.length;
    const subPct = subTotal ? Math.round(subDone / subTotal * 100) : 0;
    const tagsHtml = t.tags.map(tag => `<span class="tag" data-tag="${esc(tag)}">#${esc(tag)}</span>`).join("");

    li.innerHTML = `
      <div class="task-head">
        <div class="drag-handle" title="Drag to reorder">⠿</div>
        <div class="check ${t.completed ? "checked" : ""}" role="checkbox" aria-checked="${t.completed}"></div>
        <div class="task-body">
          <div class="task-title" data-title>${esc(t.title)}</div>
          ${t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : ""}
          <div class="task-meta">
            <span class="badge ${t.priority}">${prioDot(t.priority)} ${PRIO_LABEL[t.priority]}</span>
            ${di ? `<span class="badge date ${di.cls}">🕒 ${esc(di.txt)}</span>` : ""}
            ${t.recur !== "none" ? `<span class="badge recur">🔁 ${RECUR_LABEL[t.recur]}</span>` : ""}
            ${subTotal ? `<span class="badge sub">☑ ${subDone}/${subTotal}</span>` : ""}
            ${catBadge}
            ${tagsHtml}
          </div>
          ${subTotal ? `<div class="sub-mini"><div class="track"><div class="fill" style="width:${subPct}%"></div></div><span class="lbl">${subPct}%</span></div>` : ""}
        </div>
        <div class="task-actions">
          <button class="act expand ${isOpen ? "open" : ""}" title="Details & checklist">⌄</button>
          <button class="act gcal" title="Add to Google Calendar">📅</button>
          <button class="act ics" title="Download .ics">📆</button>
          <button class="act del" title="Delete task">🗑</button>
        </div>
      </div>
      <div class="task-detail">
        <div class="detail-section-label">Checklist / Subtasks</div>
        <ul class="sub-list">
          ${t.subtasks.map(s => `
            <li class="sub-item" data-sub="${s.id}">
              <div class="sub-check ${s.done ? "checked" : ""}"></div>
              <span class="sub-text ${s.done ? "done" : ""}">${esc(s.text)}</span>
              <button class="sub-del" title="Remove">✕</button>
            </li>`).join("")}
        </ul>
        <div class="sub-add">
          <input type="text" placeholder="Add a checklist item…" data-subadd="${t.id}" />
          <button data-subaddbtn="${t.id}">＋</button>
        </div>
        <div class="detail-section-label">Edit</div>
        <div class="detail-edit">
          <div class="field">
            <label>Priority</label>
            <select data-edit="priority">
              <option value="high" ${t.priority==="high"?"selected":""}>🔴 High</option>
              <option value="med" ${t.priority==="med"?"selected":""}>🟡 Medium</option>
              <option value="low" ${t.priority==="low"?"selected":""}>🟢 Low</option>
            </select>
          </div>
          <div class="field">
            <label>Deadline</label>
            <input type="datetime-local" data-edit="deadline" value="${t.deadline}" />
          </div>
          <div class="field">
            <label>Repeat</label>
            <select data-edit="recur">
              <option value="none" ${t.recur==="none"?"selected":""}>No repeat</option>
              <option value="daily" ${t.recur==="daily"?"selected":""}>🔁 Daily</option>
              <option value="weekly" ${t.recur==="weekly"?"selected":""}>🔁 Weekly</option>
              <option value="monthly" ${t.recur==="monthly"?"selected":""}>🔁 Monthly</option>
            </select>
          </div>
          <div class="field" style="flex:1;min-width:160px">
            <label>Tags (comma separated)</label>
            <input type="text" class="text-in" data-edit="tags" value="${esc(t.tags.join(", "))}" />
          </div>
        </div>
        <div class="detail-section-label" style="margin-top:12px">Notes</div>
        <textarea data-edit="notes" style="width:100%;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-family:var(--font);font-size:13.5px;background:var(--surface-2);color:var(--text);resize:vertical;min-height:50px;outline:none;">${esc(t.notes)}</textarea>
      </div>`;

    // events
    li.querySelector(".check").onclick = () => toggleDone(t.id);
    li.querySelector(".gcal").onclick = () => pushToGCal(t);
    li.querySelector(".ics").onclick = () => exportTaskICS(t);
    li.querySelector(".del").onclick = () => deleteTask(t.id);
    li.querySelector(".expand").onclick = () => {
      if (expanded.has(t.id)) expanded.delete(t.id); else expanded.add(t.id);
      render();
    };

    // inline title edit
    const titleEl = li.querySelector("[data-title]");
    titleEl.ondblclick = () => {
      titleEl.setAttribute("contenteditable", "true");
      titleEl.focus();
      document.execCommand && document.getSelection().selectAllChildren(titleEl);
    };
    titleEl.onblur = () => {
      titleEl.removeAttribute("contenteditable");
      const v = titleEl.textContent.trim();
      if (v && v !== t.title) { updateTask(t.id, { title: v }); }
      else titleEl.textContent = t.title;
    };
    titleEl.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); titleEl.blur(); } };

    // tag click -> filter
    li.querySelectorAll(".tag").forEach(tg => {
      tg.onclick = () => { search = tg.dataset.tag; $("searchInput").value = "#" + tg.dataset.tag; render(); };
    });

    // subtasks
    li.querySelectorAll(".sub-item").forEach(si => {
      const sid = si.dataset.sub;
      si.querySelector(".sub-check").onclick = () => toggleSub(t.id, sid);
      si.querySelector(".sub-del").onclick = () => deleteSub(t.id, sid);
    });
    const subInput = li.querySelector(`[data-subadd="${t.id}"]`);
    const subBtn = li.querySelector(`[data-subaddbtn="${t.id}"]`);
    subBtn.onclick = () => addSubtask(t.id, subInput.value);
    subInput.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); addSubtask(t.id, subInput.value); } };

    // edit controls (change = on blur/select, avoids interrupting typing)
    li.querySelectorAll("[data-edit]").forEach(el => {
      el.onchange = () => {
        const f = el.getAttribute("data-edit");
        if (f === "tags") updateTask(t.id, { tags: el.value.split(",").map(s => s.trim()).filter(Boolean) });
        else if (f === "deadline") updateTask(t.id, { deadline: el.value || "" });
        else updateTask(t.id, { [f]: el.value });
        render();
      };
    });

    // drag & drop (manual mode, active tasks)
    if (state.sortMode === "manual" && !t.completed) {
      li.setAttribute("draggable", "true");
      li.addEventListener("dragstart", () => { dragId = t.id; li.classList.add("dragging"); });
      li.addEventListener("dragend", () => { dragId = null; li.classList.remove("dragging"); document.querySelectorAll(".task").forEach(x => x.classList.remove("drag-over")); });
      li.addEventListener("dragover", (e) => { e.preventDefault(); li.classList.add("drag-over"); });
      li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
      li.addEventListener("drop", (e) => { e.preventDefault(); li.classList.remove("drag-over"); reorder(dragId, t.id); });
    }

    return li;
  }

  function reorder(fromId, toId) {
    if (!fromId || fromId === toId) return;
    const active = sortTasks(state.tasks.filter(t =>
      (activeCat === "all" || t.categoryId === activeCat) && !t.completed));
    const ids = active.map(t => t.id);
    const fi = ids.indexOf(fromId), ti = ids.indexOf(toId);
    if (fi < 0 || ti < 0) return;
    ids.splice(ti, 0, ids.splice(fi, 1)[0]);
    ids.forEach((id, i) => { const t = state.tasks.find(x => x.id === id); if (t) t.order = i; });
    save(); render();
  }

  function prioDot(p) { return p === "high" ? "🔴" : p === "med" ? "🟡" : "🟢"; }
  function esc(s) { return (s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

  // ---------- Filters / sort ----------
  document.querySelectorAll(".chip").forEach(chip => {
    chip.onclick = () => { filter = chip.dataset.filter; render(); };
  });
  $("sortSelect").onchange = (e) => { state.sortMode = e.target.value; save(); render(); };

  // ---------- Add-card interactions ----------
  const addCard = $("addCard");
  $("taskTitle").addEventListener("focus", () => addCard.classList.add("open"));
  $("taskTitle").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); addTask(); } });
  $("addTaskBtn").onclick = addTask;
  document.addEventListener("click", e => {
    if (!addCard.contains(e.target) && !$("taskTitle").value && !$("taskNotes").value && !$("taskTags").value)
      addCard.classList.remove("open");
  });

  // ---------- Search ----------
  $("searchInput").addEventListener("input", e => { search = e.target.value; render(); });
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA" && !document.activeElement.isContentEditable) {
      e.preventDefault(); $("searchInput").focus();
    }
  });

  // ---------- Category modal ----------
  const catModal = $("catModal");
  function openCatModal() {
    editingCatColor = COLORS[Math.floor(Math.random()*COLORS.length)];
    $("catNameInput").value = "";
    renderColorRow();
    catModal.classList.add("open");
    setTimeout(() => $("catNameInput").focus(), 50);
  }
  function renderColorRow() {
    const row = $("colorRow"); row.innerHTML = "";
    COLORS.forEach(col => {
      const d = document.createElement("div");
      d.className = "color-opt" + (col === editingCatColor ? " sel" : "");
      d.style.background = col;
      d.onclick = () => { editingCatColor = col; renderColorRow(); };
      row.appendChild(d);
    });
  }
  $("addCatBtn").onclick = openCatModal;
  $("catCancel").onclick = () => catModal.classList.remove("open");
  catModal.onclick = (e) => { if (e.target === catModal) catModal.classList.remove("open"); };
  $("catSave").onclick = () => {
    const name = $("catNameInput").value.trim();
    if (!name) { $("catNameInput").focus(); return; }
    const id = uid();
    state.categories.push({ id, name, color: editingCatColor });
    activeCat = id;
    save(); render();
    catModal.classList.remove("open");
    toast("Notebook created ✓");
  };
  $("catNameInput").addEventListener("keydown", e => { if (e.key === "Enter") $("catSave").click(); });

  // ---------- Backup / Restore ----------
  $("exportBtn").onclick = () => {
    downloadFile("tasknest-backup-" + new Date().toISOString().slice(0,10) + ".json",
      JSON.stringify(state, null, 2), "application/json");
    toast("Backup downloaded ⬇");
  };
  $("importBtn").onclick = () => $("importFile").click();
  $("importFile").addEventListener("change", e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.categories || !data.tasks) throw new Error("bad file");
        if (!confirm("Restore this backup? It will replace your current data.")) return;
        data.theme = data.theme || "light";
        data.sortMode = data.sortMode || "smart";
        data.tasks = data.tasks.map(normalizeTask);
        state = data; activeCat = "all"; expanded.clear();
        save(); applyTheme(); render();
        toast("Backup restored ✓");
      } catch (err) { toast("⚠ Invalid backup file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // ---------- Mobile nav ----------
  $("menuToggle").onclick = () => document.body.classList.toggle("nav-open");
  $("scrim").onclick = () => document.body.classList.remove("nav-open");

  // ---------- Toast ----------
  let toastTimer;
  function toast(msg) {
    const el = $("toast"); el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
  }

  // ---------- Init ----------
  applyTheme();
  render();
})();
</script>
</body>
</html>
